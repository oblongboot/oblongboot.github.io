<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SlayerXPOverlay Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #0d0d1a;
      color: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .center-top-box {
      padding: 20px 40px;
      background: rgba(30, 30, 60, 0.85);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(98, 0, 234, 0.4);
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
      transition: transform 0.3s ease;
    }

    .center-top-box:hover {
      transform: scale(1.03);
    }

    .button-row {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .button-row button {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
    }

    .button-row button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 20px rgba(101, 31, 255, 0.6);
    }

    @media (max-width: 400px) {
      .button-row {
        flex-direction: column;
      }
      .button-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="center-top-box">
    SlayerXPOverlay
  </div>
  <div class="button-row">
    <button onclick="window.open('https://chattriggers.com/modules/v/SlayerXPOverlay', '_blank')">CT (Forge 1.8.9)</button>
    <button onclick="window.open('https://github.com/oblongboot/SlayerXPOverlayFabric', '_blank')">Fabric (1.21.5)</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 100, density: { enable: true, value_area: 800 } },
        color: { value: "#8a2be2" },
        shape: {
          type: "circle",
          stroke: { width: 0, color: "#000" },
          polygon: { nb_sides: 5 }
        },
        opacity: { value: 0.4, random: false },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 140,
          color: "#6a0dad",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 2,
          direction: "none",
          random: false,
          straight: false,
          out_mode: "out",
          bounce: false
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" },
          resize: true
        },
        modes: {
          grab: { distance: 400, line_linked: { opacity: 1 } },
          bubble: { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 },
          repulse: { distance: 150, duration: 0.4 },
          push: { particles_nb: 4 },
          remove: { particles_nb: 2 }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
